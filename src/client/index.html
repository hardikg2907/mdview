<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>mdview</title>
    <!--
      External, render-blocking bootstrap script. Sets data-theme / data-palette
      / data-wide on <html> from localStorage BEFORE first paint, so reload
      doesn't flash the default theme. Must stay external (not inline) — the
      strict CSP `script-src 'self'` set by the server blocks inline scripts.
    -->
    <script src="/bootstrap.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
